<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#1f3b52 0,transparent 35%),
        linear-gradient(135deg,#0d141c,#121b24);
    font-family:Segoe UI,Arial,sans-serif;
    color:white;
}

.card{
    width:460px;
    background:#17212b;
    border:1px solid #2b3d4d;
    border-radius:22px;
    padding:34px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
    font-size:32px;
    font-weight:800;
    text-align:center;
    margin-bottom:8px;
}

.logo span{
    color:#5ea4e8;
}

.title{
    text-align:center;
    font-size:20px;
    font-weight:600;
    margin-bottom:6px;
}

.subtitle{
    text-align:center;
    color:#8d9baa;
    font-size:14px;
    margin-bottom:28px;
}

form p{
    margin-bottom:16px;
}

label{
    display:block;
    font-size:13px;
    color:#8d9baa;
    margin-bottom:7px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #2b3d4d;
    border-radius:12px;
    background:#0f1821;
    color:white;
    font-size:14px;
    transition:.15s;
}

input:focus{
    outline:none;
    border-color:#3f7faf;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#2c5f87;
    color:white;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.15s;
}

button:hover{
    background:#39729e;
}

.error{
    background:#3d2026;
    border:1px solid #6d3139;
    color:#ffb8c1;
    padding:13px;
    border-radius:12px;
    margin-bottom:18px;
    font-size:13px;
}

.link{
    margin-top:20px;
    text-align:center;
    font-size:14px;
    color:#8d9baa;
}

.link a{
    color:#9fc4e3;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

.footer{
    margin-top:22px;
    text-align:center;
    color:#6d7c89;
    font-size:12px;
    border-top:1px solid #263847;
    padding-top:16px;
}

</style>
</head>

<body>

<div class="card">

    <div class="title">Вход</div>
    <div class="subtitle">Войдите в аккаунт FlashChat</div>

    {% if form.errors %}
        <div class="error">
            Неверное имя пользователя или пароль.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label>Имя пользователя</label>
            {{ form.username }}
        </p>

        <p>
            <label>Пароль</label>
            {{ form.password }}
        </p>

        <button type="submit">Войти</button>
    </form>

    <div class="link">
        Нет аккаунта? <a href="/register/">Зарегистрироваться</a>
    </div>

</div>

</body>
</html>
